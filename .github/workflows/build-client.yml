name: Build & Publish Client

on:
  push:
    branches: [master]
    paths:
      - 'MuMain/**'
  workflow_dispatch:        # Allow manual trigger
    inputs:
      skip_version_check:
        description: 'Saltar validación de versión incremental (solo para emergencias)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write           # Needed to push to client-release branch

jobs:
  build:
    runs-on: windows-latest
    name: Build MuMain Client

    steps:
      # ── Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── Validar versión incremental y changelog ─────────────────
      - name: Validate version and changelog
        id: validate
        shell: pwsh
        run: |
          $skipCheck = "${{ github.event.inputs.skip_version_check }}" -eq "true"
          $versionFile = "MuMain/VERSION"
          $changelogFile = "MuMain/CLIENT_CHANGELOG.md"

          if (-not (Test-Path $versionFile)) {
            Write-Error "Falta MuMain/VERSION. Crea el archivo con la versión (ej: 1.0.0)"
            exit 1
          }
          $newVersion = (Get-Content $versionFile -Raw).Trim()
          if (-not $newVersion -match '^\d+\.\d+\.\d+$') {
            Write-Error "VERSION debe ser semántica (ej: 1.0.0). Actual: $newVersion"
            exit 1
          }

          if (-not (Test-Path $changelogFile)) {
            Write-Error "Falta MuMain/CLIENT_CHANGELOG.md. Documenta los cambios para el updater."
            exit 1
          }

          # Comparar con última versión en client-release
          $lastVersion = "0.0.0"
          $branchExists = git ls-remote --heads origin client-release 2>$null
          if ($branchExists) {
            git fetch origin client-release --depth 1 2>$null
            $verJson = git show origin/client-release:version.json 2>$null
            if ($verJson) {
              $last = $verJson | ConvertFrom-Json
              $lastVersion = $last.version -replace '-\w+$', ''  # quitar sufijo -commit si existe
              if (-not $lastVersion -match '^\d+\.\d+\.\d+') { $lastVersion = "0.0.0" }
            }
          }

          if (-not $skipCheck) {
            $lastParts = $lastVersion -split '\.' | ForEach-Object { [int]$_ }
            $newParts = $newVersion -split '\.' | ForEach-Object { [int]$_ }
            $ok = $false
            for ($i = 0; $i -lt 3; $i++) {
              if ($newParts[$i] -gt $lastParts[$i]) { $ok = $true; break }
              if ($newParts[$i] -lt $lastParts[$i]) { break }
            }
            if (-not $ok) {
              Write-Error "La versión $newVersion debe ser mayor que $lastVersion. Actualiza MuMain/VERSION."
              exit 1
            }
          }

          # Extraer changelog de "## Próxima versión"
          $content = Get-Content $changelogFile -Raw -Encoding UTF8
          $changelog = @()
          $inSection = $false
          foreach ($line in ($content -split "`n")) {
            if ($line -match '^##\s+Pr') { $inSection = $true; continue }
            if ($inSection -and $line -match '^##\s+') { break }
            if ($inSection -and $line -match '^\-\s+(.+)') { $changelog += $matches[1].Trim() }
          }
          if ($changelog.Count -eq 0 -and -not $skipCheck) {
            Write-Error "Añade al menos un ítem en '## Próxima versión' de CLIENT_CHANGELOG.md"
            exit 1
          }
          $changelog | ConvertTo-Json | Set-Content "changelog-out.json" -Encoding UTF8
          echo "VERSION=$newVersion" >> $env:GITHUB_OUTPUT
          Write-Host "✓ Versión $newVersion validada. Changelog: $($changelog.Count) ítems"

      # ── Setup .NET (for ClientLibrary Native AOT) ────────────────
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      # ── Configure CMake (x86 to match original MU client) ────────
      - name: Configure CMake
        run: |
          cmake -S MuMain/src `
                -B MuMain/build `
                -G "Visual Studio 17 2022" `
                -A Win32 `
                -DCMAKE_BUILD_TYPE=RelWithDebInfo
        shell: pwsh

      # ── Build ─────────────────────────────────────────────────────
      - name: Build Main.exe
        run: cmake --build MuMain/build --config RelWithDebInfo --parallel
        shell: pwsh

      # ── Collect output files ──────────────────────────────────────
      - name: Collect client files
        shell: pwsh
        run: |
          $outDir  = "MuMain/build/RelWithDebInfo"
          $distDir = "client-dist"

          New-Item -ItemType Directory -Path $distDir -Force | Out-Null

          # Main executable
          if (Test-Path "$outDir/Main.exe") {
            Copy-Item "$outDir/Main.exe" $distDir
            Write-Host "✓ Main.exe copied"
          } else {
            Write-Error "Main.exe not found in $outDir"
            exit 1
          }

          # Required DLLs
          $dlls = @("wzAudio.dll","glew32.dll","ogg.dll","vorbisfile.dll")
          foreach ($dll in $dlls) {
            $src = Get-ChildItem -Path $outDir -Filter $dll -Recurse | Select-Object -First 1
            if ($src) {
              Copy-Item $src.FullName $distDir
              Write-Host "✓ $dll copied"
            } else {
              Write-Warning "DLL not found: $dll"
            }
          }

          # .NET ClientLibrary DLL (Native AOT)
          $clientDll = Get-ChildItem -Path $outDir -Filter "MUnique.Client.Library.dll" -Recurse | Select-Object -First 1
          if ($clientDll) {
            Copy-Item $clientDll.FullName $distDir
            Write-Host "✓ MUnique.Client.Library.dll copied"
          }

          # Copy all remaining .dll files from build output
          Get-ChildItem "$outDir/*.dll" | ForEach-Object {
            $destFile = Join-Path $distDir $_.Name
            if (-not (Test-Path $destFile)) {
              Copy-Item $_.FullName $distDir
              Write-Host "✓ Extra DLL: $($_.Name)"
            }
          }

          # List what we have
          Write-Host "`n=== Client dist contents ==="
          Get-ChildItem $distDir | Format-Table Name, Length

      # ── Generate version.json (con array files para el updater) ───
      - name: Generate version.json
        shell: pwsh
        run: |
          $version = "${{ steps.validate.outputs.VERSION }}"
          $commit  = (git rev-parse --short HEAD).Trim()
          $date    = Get-Date -Format "yyyy-MM-dd"
          $distDir = "client-dist"

          $changelog = @()
          if (Test-Path "changelog-out.json") {
            $changelog = Get-Content "changelog-out.json" -Raw | ConvertFrom-Json
          }

          # Generar array files con path, sha256, size (requerido por el launcher)
          $files = @()
          $sha = [System.Security.Cryptography.SHA256]::Create()
          Get-ChildItem $distDir -File | ForEach-Object {
            $path = $_.Name
            $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
            $hash = $sha.ComputeHash($bytes)
            $hex = [BitConverter]::ToString($hash) -replace '-',''
            $files += @{ path = $path; sha256 = $hex.ToLower(); size = $_.Length }
          }
          $sha.Dispose()

          $json = [ordered]@{
            version   = $version
            date      = $date
            commit    = $commit
            changelog  = $changelog
            files     = $files
          } | ConvertTo-Json -Depth 4

          Set-Content "$distDir/version.json" $json -Encoding UTF8
          Write-Host "version.json: $version, $($files.Count) archivos"

      # ── Push to client-release branch ────────────────────────────
      - name: Deploy to client-release branch
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          $commit  = (git rev-parse --short HEAD).Trim()
          $version = (Get-Content "client-dist/version.json" | ConvertFrom-Json).version

          # Check if client-release exists remotely
          $exists = git ls-remote --heads origin client-release
          if ($exists) {
            # Checkout existing branch
            git fetch origin client-release
            git checkout client-release
            # Remove old files (keep .git)
            Get-ChildItem -Exclude ".git" | Remove-Item -Recurse -Force
          } else {
            # Create orphan branch
            git checkout --orphan client-release
            git rm -rf . 2>$null
          }

          # Copy new files
          Copy-Item -Recurse "client-dist/*" . -Force

          # Add README
          @"
# MuVoid Client Distribution

> Auto-generated by GitHub Actions — do not edit manually.

**Version:** $version  
**Commit:** $commit  
**Date:** $(Get-Date -Format 'yyyy-MM-dd')

## Installing
The MuVoid Launcher downloads this branch automatically.
You do not need to clone this branch manually.
"@ | Set-Content README.md -Encoding UTF8

          git add --all
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore(client): release $version from $commit"
            git push origin client-release
            Write-Host "✓ Pushed client version $version to client-release"
          } else {
            Write-Host "No changes to push."
          }
